name: Publish mod library release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged catalog
        uses: actions/checkout@v7

      - name: Verify every embedded package manifest
        shell: pwsh
        run: |
          $archives = @(Get-ChildItem -LiteralPath release-assets -File -Filter *.zip)
          if ($archives.Count -eq 0) { throw "No release packages were staged." }
          ./tools/verify-package.ps1 -PackagePath $archives.FullName

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/*.zip \
            --title "OpenDereth Mods ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md
